[repositories]
rugix-extra = { git = "https://github.com/rugix/rugix-extra.git", branch = "v0.8" }
nexigon = { git = "https://github.com/nexigon/nexigon-rugix.git", branch = "main" }

# Compatible with:
# - Raspberry Pi 5
# - Raspberry Pi 4 (with recent firmware)
# - Raspberry Pi CM4 (with recent firmware)
[systems.rpi-tryboot]
layer = "customized"
architecture = "arm64"
target = "rpi-tryboot"

# Strato Pi with dual SD card switching matrix.
[systems.stratopi-dual-sd]
layer = "customized-dual-sd"
architecture = "arm64"
target = "bsp"
