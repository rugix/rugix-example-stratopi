parent = "core/debian-trixie"

recipes = [
    # Prepares the Raspberry Pi base image for usage with Rugix.
    "core/rpi-debian-setup",
    # Set a static hostname.
    "core/set-hostname",
    # Persist `/root`.
    "core/persist-root-home",
    # Setup and enable SSH.
    "core/ssh",
    # Enable root login with password authentication (demo image only).
    "demo-ssh-root",
    # Install common CLI tools (git, wget) for the demo image.
    "demo-basic-tools",
    # Install Podman so rugix-bakery can run on-device.
    "demo-podman",
    # Blink the front-panel green LED so updates are visible at a glance.
    "demo-sysfs-blink",
    # Setup the network.
    "rugix-extra/debian-setup-network",
    # Setup the time synchronization.
    "rugix-extra/debian-setup-timesyncd",
    # Enable discovery of the system in the local network.
    "rugix-extra/avahi",
    # Build and install the Strato Pi Max kernel module.
    "stratopi-max-kernel-module",
    # Build and install the PCF2131 RTC driver.
    "stratopi-rtc-pcf2131",
    # Configure and enable the Strato Pi MCU watchdog.
    "stratopi-max-watchdog",
    # Reboot helper via Strato Pi MCU power cycle.
    "stratopi-max-power-cycle-reboot",
    # Create /dev/stratopi/ device symlinks for SD card slots.
    "stratopi-max-normalized-devices",

    ## Enable the following recipes for the nexigon integration.
    ##
    ## Requires configuration through .env.

    # Setup Nexigon Agent for Raspberry Pi.
    # "nexigon/nexigon-agent-rpi",
    # Setup Nexigon Agent.
    # "nexigon/nexigon-agent",
    # Configure Nexigon Agent.
    # "nexigon/nexigon-agent-config",
    # Power management commands.
    # "nexigon/nexigon-power",
    # Systemd service management commands.
    # "nexigon/nexigon-systemd",
]

[parameters."core/set-hostname"]
hostname = "rugix-stratopi"

[parameters."core/pkg-cleanup"]
autoremove = true

[parameters."core/ssh"]
# Replace with your own SSH key.
root_authorized_keys = """
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH278KH3NlBdcPHk8XaTpZCG578JZ3WFjhifuic9FYJN koehlma@photon
"""

[parameters."demo-ssh-root"]
# Plaintext root password baked into the demo image. Change or clear before
# shipping anything that isn't a throwaway test unit.
root_password = "rugix"

## Parameters for the Nexigon recipes. Uncomment together with the
## corresponding recipes above; the bakery rejects parameter blocks for
## recipes that aren't part of the layer.
# [parameters."nexigon/nexigon-agent"]
# version = "v0.5"
#
# [parameters."nexigon/nexigon-agent-config"]
# extra_config = """
# [commands]
# enabled = true
#
# [terminal]
# enabled = true
# user = "root"
# """

# Use the experimental container-bundled Rugix Ctrl binaries instead of the
# latest GitHub release. The bsp target and a few other init/bootstrap bits
# the dual-SD setup depends on are only available there.
[parameters."core/rugix-ctrl"]
version = "container"
