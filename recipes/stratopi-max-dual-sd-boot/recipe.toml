description = "Rugix A/B boot flow using the Strato Pi dual SD card switching matrix"
dependencies = ["stratopi-max-normalized-devices"]

[parameters]
# Target size of the system partition. The shipped image leaves the
# partition unsized (so it shrink-wraps to the rootfs); bootstrap grows
# it to this size on first boot, then adds the data partition behind it
# in whatever space remains on the physical SD card.
system_size = { default = "2GiB" }

# Value the boot flow writes to `watchdog/sd_switch_config` on commit, i.e.
# the number of consecutive watchdog resets (with no heartbeat in between)
# that the MCU tolerates before swapping the SD routing. `0` disables
# watchdog-driven failover outside of the update window; `1` swaps on every
# reset; `N > 1` swaps after N consecutive resets.
committed_sd_switch_config = { default = "3" }
